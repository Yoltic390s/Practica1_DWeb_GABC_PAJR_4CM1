<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Etiquetas HTML</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .text-center { text-align: center; }


        table { width: 80%; margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
        th { background-color: #e0e0e0; }


        .gifCat { text-align: center; margin-top: 50px; font-family: "Comic Sans MS", cursive; color: #666; }
        .gifCat img { width: 80px; height: auto; }
    </style>
</head>
<body>

<h1 class="text-center">Catálogo de Etiquetas HTML - Práctica 1</h1>
<h3 class="text-center">Gabriel Alejandro Becerril Cabral</h3>
<h3 class="text-center">Pedro Antonio Jimenez Ramirez</h3>
<h3 class="text-center">4CM1</h3>

<hr>

<table>
    <thead>
    <tr>
        <th>Etiqueta HTML</th>
        <th>Categoría</th>
        <th>Acción</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="etiqueta : ${etiquetas}">
        <td th:text="${etiqueta.nombre}"></td>
        <td th:text="${etiqueta.categoria}"></td>
        <td>
            <a th:href="@{/etiqueta/{id}(id=${etiqueta.id})}">Ver sintaxis y ejemplos</a>
        </td>
    </tr>
    </tbody>
</table>

<div class="gifCat">
    <img th:src="@{/imgs/tomcat.gif}" alt="GRACIAS TOMCAT">
    <p>Gracias Tomcat</p>
</div>

</body>
</html>
