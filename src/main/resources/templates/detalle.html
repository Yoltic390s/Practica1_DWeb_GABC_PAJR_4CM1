<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="'Etiqueta ' + ${etiqueta.nombre}"></title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }

    /* ESTOS ESTILOS DE CÓDIGO SE MANTIENEN INTACTOS */
    pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; }

    /* Borde simple negro para el ejemplo real */
    .ejemplo-real { border: 1px solid #000; padding: 15px; margin-top: 10px; }

    /* Usamos una tabla sin bordes para alinear los botones de navegación */
    .navegacion-tabla { width: 100%; margin-top: 40px; text-align: center; }
    .navegacion-tabla td { border: none; padding: 10px; }
  </style>
</head>
<body>

<h1 th:text="'Etiqueta: ' + ${etiqueta.nombre}"></h1>
<p><strong>Categoría:</strong> <span th:text="${etiqueta.categoria}"></span></p>

<hr>

<h2>Descripción y significado</h2>
<p th:text="${etiqueta.descripcion}"></p>

<h2>Sintaxis básica</h2>
<pre><code th:text="${etiqueta.sintaxis}"></code></pre>

<h2>Atributos más comunes</h2>
<p th:text="${etiqueta.atributos}"></p>

<h2>Ejemplo de código</h2>
<pre><code th:utext="${etiqueta.codigoEjemplo}"></code></pre>

<h2>Ejemplo funcional (Renderizado real)</h2>
<div class="ejemplo-real" th:utext="${etiqueta.ejemploReal}"></div>

<hr>

<table class="navegacion-tabla">
  <tr>
    <td style="width: 33%; text-align: left;">
      <a th:if="${etiqueta.idAnterior != ''}" th:href="@{/etiqueta/{id}(id=${etiqueta.idAnterior})}">&lt;&lt; Anterior</a>
    </td>
    <td style="width: 33%;">
      <a th:href="@{/}">Volver al Catálogo</a>
    </td>
    <td style="width: 33%; text-align: right;">
      <a th:if="${etiqueta.idSiguiente != ''}" th:href="@{/etiqueta/{id}(id=${etiqueta.idSiguiente})}">Siguiente &gt;&gt;</a>
    </td>
  </tr>
</table>

</body>
</html>
